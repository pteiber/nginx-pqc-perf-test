---
# Deploys the nginx PQC-vs-ECDHE handshake benchmark directly onto a
# Rocky Linux 9 host (no containers). Mirrors the container-based harness
# at the repo root: same bench tool, same certs script, same html
# payload, same nginx.conf pattern (twin files differing in one Groups
# line) - reused verbatim from repo_root where possible rather than
# duplicated. See ../README.md for prerequisites and usage.
- name: Deploy nginx-pqc-perf-test to Rocky Linux 9
  hosts: all
  become: true

  vars:
    repo_root: "{{ playbook_dir }}/../.."
    deploy_root: /opt/nginx-pqc-perf-test
    nginx_pqc_port: 8443
    nginx_classic_port: 9443

  tasks:
    # --- preflight ------------------------------------------------------
    - name: Preflight - confirm repo_root looks right
      ansible.builtin.stat:
        path: "{{ repo_root }}/{{ item }}"
      loop:
        - bench/main.go
        - certs/gen-certs.sh
        - html/small.html
        - scripts/summarize.sh
      register: preflight_files
      delegate_to: localhost
      become: false

    - name: Preflight - fail fast if repo files are missing
      ansible.builtin.assert:
        that: item.stat.exists
        fail_msg: >-
          {{ item.item }} not found under repo_root ({{ repo_root }}).
          Run this playbook from aws/ansible/ inside the
          nginx-pqc-perf-test repo, or adjust the repo_root variable.
      loop: "{{ preflight_files.results }}"
      loop_control:
        label: "{{ item.item }}"

    # --- nginx.org repo ---------------------------------------------------
    - name: Import nginx.org signing key
      ansible.builtin.rpm_key:
        key: https://nginx.org/keys/nginx_signing.key
        state: present

    - name: Add nginx.org yum repo (stable, RHEL9 packages - Rocky 9 is ABI-compatible)
      ansible.builtin.yum_repository:
        name: nginx-stable
        description: nginx.org stable repo
        baseurl: http://nginx.org/packages/rhel/9/$basearch/
        gpgcheck: true
        gpgkey: https://nginx.org/keys/nginx_signing.key
        enabled: true

    - name: Install packages
      ansible.builtin.dnf:
        name:
          - nginx      # from nginx-stable above: newer version wins over Rocky's AppStream 1.20.1
          - golang     # dnf AppStream ships >= 1.24, which bench/go.mod requires for X25519MLKEM768
          - jq         # used by summarize.sh
          - policycoreutils-python-utils  # semanage/restorecon, needed below
          - procps-ng  # pgrep/ps - not present on a minimal image, used by run-benchmark.sh's CPU/mem polling
        state: present

    # bench/go.mod requires Go >= 1.24; an older toolchain compiles fine but
    # silently produces zero usable curves for X25519MLKEM768, which only shows
    # up much later as a failed TLS sanity check. Fail fast here instead.
    - name: Confirm Go toolchain is >= 1.24
      ansible.builtin.command: /usr/bin/go version
      register: go_version
      changed_when: false

    - name: Assert Go >= 1.24
      vars:
        go_ver: "{{ go_version.stdout | regex_search('[0-9]+\\.[0-9]+') }}"
      ansible.builtin.assert:
        that:
          - go_ver | length > 0
          - go_ver is version('1.24', '>=')
        fail_msg: >-
          Go >= 1.24 is required for X25519MLKEM768, but found:
          "{{ go_version.stdout }}". The 'golang' AppStream package on this
          Rocky 9 host is too old.

    # --- directories, shared payload, certs --------------------------------
    - name: Create deployment directories
      ansible.builtin.file:
        path: "{{ deploy_root }}/{{ item }}"
        state: directory
        owner: root
        group: root
        mode: "0755"
      loop:
        - certs
        - html
        - nginx-pqc
        - nginx-classic
        - results
        - bench/src

    - name: Copy html/small.html from repo root
      ansible.builtin.copy:
        src: "{{ repo_root }}/html/small.html"
        dest: "{{ deploy_root }}/html/small.html"
        mode: "0644"

    - name: Copy certs/gen-certs.sh from repo root
      ansible.builtin.copy:
        src: "{{ repo_root }}/certs/gen-certs.sh"
        dest: "{{ deploy_root }}/gen-certs.sh"
        mode: "0755"

    - name: Generate the shared ECDSA P-256 cert (idempotent - gen-certs.sh skips if it already exists)
      ansible.builtin.command: "{{ deploy_root }}/gen-certs.sh {{ deploy_root }}/certs"
      args:
        creates: "{{ deploy_root }}/certs/server.crt"

    # --- SELinux (Rocky 9 ships enforcing by default) -----------------------
    - name: SELinux - label html dir as httpd_sys_content_t
      ansible.builtin.command: semanage fcontext -a -t httpd_sys_content_t "{{ deploy_root }}/html(/.*)?"
      register: sec_html
      changed_when: sec_html.rc == 0
      failed_when: sec_html.rc != 0 and 'already defined' not in sec_html.stderr

    - name: SELinux - label nginx conf dirs as httpd_config_t
      ansible.builtin.command: semanage fcontext -a -t httpd_config_t "{{ deploy_root }}/{{ item }}(/.*)?"
      loop:
        - nginx-pqc
        - nginx-classic
      register: sec_conf
      changed_when: sec_conf.rc == 0
      failed_when: sec_conf.rc != 0 and 'already defined' not in sec_conf.stderr

    - name: SELinux - label certs dir as cert_t
      ansible.builtin.command: semanage fcontext -a -t cert_t "{{ deploy_root }}/certs(/.*)?"
      register: sec_certs
      changed_when: sec_certs.rc == 0
      failed_when: sec_certs.rc != 0 and 'already defined' not in sec_certs.stderr

    - name: SELinux - allow http_port_t on the benchmark ports
      ansible.builtin.command: "semanage port -a -t http_port_t -p tcp {{ item }}"
      loop:
        - "{{ nginx_pqc_port }}"
        - "{{ nginx_classic_port }}"
      register: sec_port
      changed_when: sec_port.rc == 0
      failed_when: sec_port.rc != 0 and 'already defined' not in sec_port.stderr

    - name: SELinux - apply the contexts above
      ansible.builtin.command: "restorecon -Rv {{ deploy_root }}"
      register: sec_restorecon
      changed_when: sec_restorecon.stdout != ""

    # --- nginx configs and systemd units -------------------------------------
    - name: Template nginx-pqc.conf
      ansible.builtin.template:
        src: templates/nginx-pqc.conf.j2
        dest: "{{ deploy_root }}/nginx-pqc/nginx.conf"
        mode: "0644"
      notify: Restart nginx-pqc

    - name: Template nginx-classic.conf
      ansible.builtin.template:
        src: templates/nginx-classic.conf.j2
        dest: "{{ deploy_root }}/nginx-classic/nginx.conf"
        mode: "0644"
      notify: Restart nginx-classic

    - name: Template systemd units
      ansible.builtin.template:
        src: "templates/{{ item }}.service.j2"
        dest: "/etc/systemd/system/{{ item }}.service"
        mode: "0644"
      loop:
        - nginx-pqc
        - nginx-classic
      notify: Reload systemd

    - name: Flush handlers so units/configs are in place before enabling
      ansible.builtin.meta: flush_handlers

    - name: Enable and start nginx-pqc and nginx-classic
      ansible.builtin.systemd:
        name: "{{ item }}"
        enabled: true
        state: started
        daemon_reload: true
      loop:
        - nginx-pqc
        - nginx-classic

    # --- firewalld (loopback traffic isn't filtered either way; this only
    # matters if expose_benchmark_ports is later turned on in Terraform).
    # Uses plain firewall-cmd rather than the ansible.posix.firewalld
    # module, to avoid requiring an extra collection install. ----
    - name: Check firewalld status
      ansible.builtin.systemd:
        name: firewalld
      register: firewalld_status
      failed_when: false

    - name: Allow benchmark ports through firewalld, if active
      ansible.builtin.command: "firewall-cmd --permanent --add-port={{ item }}/tcp"
      loop:
        - "22"
        - "{{ nginx_pqc_port }}"
        - "{{ nginx_classic_port }}"
      when: firewalld_status.status.ActiveState | default('inactive') == 'active'
      register: fw_add_port
      changed_when: "'ALREADY_ENABLED' not in fw_add_port.stderr"

    - name: Reload firewalld, if active
      ansible.builtin.command: firewall-cmd --reload
      when: firewalld_status.status.ActiveState | default('inactive') == 'active'
      changed_when: true

    # --- bench tool -----------------------------------------------------
    - name: Copy bench/ source from repo root
      ansible.builtin.copy:
        src: "{{ repo_root }}/bench/"
        dest: "{{ deploy_root }}/bench/src/"
        mode: "0644"

    - name: Build the bench binary
      ansible.builtin.command: /usr/bin/go build -o {{ deploy_root }}/bench/bench .
      args:
        chdir: "{{ deploy_root }}/bench/src"
        creates: "{{ deploy_root }}/bench/bench"
      environment:
        CGO_ENABLED: "0"
        HOME: /root

    # --- run script and summarizer --------------------------------------
    - name: Copy scripts/summarize.sh from repo root (used unmodified)
      ansible.builtin.copy:
        src: "{{ repo_root }}/scripts/summarize.sh"
        dest: "{{ deploy_root }}/summarize.sh"
        mode: "0755"

    - name: Copy run-benchmark-native.sh
      ansible.builtin.copy:
        src: files/run-benchmark-native.sh
        dest: "{{ deploy_root }}/run-benchmark.sh"
        mode: "0755"

    # --- sanity checks, mirrors scripts/run-benchmark.sh's own checks ------
    - name: Sanity check - nginx-pqc serves /small
      ansible.builtin.uri:
        url: "https://localhost:{{ nginx_pqc_port }}/small"
        validate_certs: false
        status_code: 200

    - name: Sanity check - nginx-classic serves /small
      ansible.builtin.uri:
        url: "https://localhost:{{ nginx_classic_port }}/small"
        validate_certs: false
        status_code: 200

    - name: Sanity check - nginx-pqc negotiates X25519MLKEM768
      ansible.builtin.shell: >
        echo | openssl s_client -connect localhost:{{ nginx_pqc_port }}
        -groups X25519MLKEM768 -brief 2>&1
        | grep -q "Negotiated TLS1.3 group: X25519MLKEM768"
      changed_when: false

    - name: Sanity check - nginx-classic rejects an X25519MLKEM768-only offer
      ansible.builtin.shell: >
        echo | openssl s_client -connect localhost:{{ nginx_classic_port }}
        -groups X25519MLKEM768 2>&1
        | grep -q "handshake failure"
      changed_when: false

  handlers:
    - name: Reload systemd
      ansible.builtin.systemd:
        daemon_reload: true

    - name: Restart nginx-pqc
      ansible.builtin.systemd:
        name: nginx-pqc
        state: restarted

    - name: Restart nginx-classic
      ansible.builtin.systemd:
        name: nginx-classic
        state: restarted
