# Benchmark environment for comparing nginx TLS 1.3 with a post-quantum
# key exchange (X25519MLKEM768) against classical ECDHE (X25519).
#
# Services:
#   certs         one-shot job that generates a shared ECDSA P-256 cert
#   nginx-pqc     nginx offering X25519MLKEM768:X25519  (port 8443)
#   nginx-classic nginx offering X25519 only             (port 9443)
#   bench         Go load-test tool, invoked via `compose run --rm bench ...`
#
# Typical usage is via scripts/run-benchmark.sh, which drives all of the
# above. See README.md for details and how to interpret results.

services:
  certs:
    image: alpine:3
    volumes:
      - ./certs:/certs-src:ro
      - certs-data:/out
    command: ["sh", "-c", "apk add --no-cache openssl >/dev/null && sh /certs-src/gen-certs.sh /out"]

  nginx-pqc:
    image: nginx:1.31.2
    depends_on:
      certs:
        condition: service_completed_successfully
    volumes:
      - ./nginx/pqc/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./html:/usr/share/nginx/html:ro
      - certs-data:/etc/nginx/certs:ro
    ports:
      - "8443:443"

  nginx-classic:
    image: nginx:1.31.2
    depends_on:
      certs:
        condition: service_completed_successfully
    volumes:
      - ./nginx/classic/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./html:/usr/share/nginx/html:ro
      - certs-data:/etc/nginx/certs:ro
    ports:
      - "9443:443"

  bench:
    build:
      context: ./bench
    depends_on:
      - nginx-pqc
      - nginx-classic
    volumes:
      - ./results:/results

volumes:
  certs-data:
