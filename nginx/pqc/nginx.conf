worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    access_log off;

    server {
        listen 443 ssl;
        server_name localhost;

        ssl_certificate     /etc/nginx/certs/server.crt;
        ssl_certificate_key /etc/nginx/certs/server.key;

        # TLS 1.3 only. Offer the hybrid post-quantum KEM X25519MLKEM768
        # first, with classical X25519 as fallback. This is the only line
        # that differs from nginx/classic/nginx.conf.
        ssl_protocols TLSv1.3;
        ssl_conf_command Groups X25519MLKEM768:X25519;

        ssl_session_cache off;
        ssl_session_tickets off;

        root /usr/share/nginx/html;

        location = /small {
            alias /usr/share/nginx/html/small.html;
        }
    }
}
